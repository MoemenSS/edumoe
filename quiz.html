<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EDUMOE · Quiz</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background -->
<div class="bg-canvas">
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>
</div>

<!-- Navbar -->
<nav class="navbar lg lg-pill">
  <div class="lg-effect"></div>
  <div class="lg-tint"></div>
  <div class="lg-shine"></div>

  <a class="nav-logo" href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 8px;">
    <span class="nav-logo-mark" style="font-size: 24px; font-weight: 900; background: linear-gradient(135deg, var(--accent), var(--glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">◆</span>
    <span class="nav-logo-name" style="font-size: 18px; font-weight: 800; color: var(--txt1);">EDUMOE</span>
  </a>

  <div class="nav-links">
    <a class="nav-btn-link" href="index.html" style="text-decoration: none;">Home</a>
    <a class="nav-btn-link" href="courses.html" style="text-decoration: none;">Courses</a>
    <a class="nav-btn-link active" href="quiz.html" style="text-decoration: none;">Quiz</a>
    <a class="nav-btn-link" href="simulators.html" style="text-decoration: none;">Simulators</a>
    <a class="nav-btn-link" href="moeai.html" style="text-decoration: none;">MoeAI</a>
  </div>

  <div class="nav-right">
    <div class="theme-switcher" title="Switch theme">
      <div class="theme-dot td-ruby active" onclick="setTheme('ruby', this)" style="cursor: pointer;"></div>
      <div class="theme-dot td-lava" onclick="setTheme('lava', this)" style="cursor: pointer;"></div>
      <div class="theme-dot td-space" onclick="setTheme('space', this)" style="cursor: pointer;"></div>
      <div class="theme-dot td-oxford" onclick="setTheme('oxford', this)" style="cursor: pointer;"></div>
      <div class="theme-dot td-light" onclick="setTheme('light', this)" style="cursor: pointer;"></div>
      <div class="theme-dot td-emerald" onclick="setTheme('emerald', this)" style="cursor: pointer;"></div>
    </div>

    <div id="auth-container">
      <button class="nav-auth-btn" onclick="document.getElementById('loginModal').style.display='flex'" style="cursor: pointer;">Login</button>
      <button class="nav-cta" onclick="document.getElementById('signupModal').style.display='flex'" style="cursor: pointer;">Sign Up</button>
    </div>
    <div id="logged-in-container" style="display: none; display: flex; align-items: center; gap: 12px;">
      <span id="user-name" style="font-size: 14px; color: var(--txt2);"></span>
      <button class="nav-auth-btn" onclick="doLogout()" style="cursor: pointer;">Logout</button>
    </div>
  </div>
</nav>

<!-- Page Content -->
<div style="min-height: 100vh; padding-top: 120px; padding-bottom: 80px;">

  <div class="wrap section">
    <div class="section-head">
      <div class="section-label">
        <div class="section-label-dot"></div>
        TEST YOUR KNOWLEDGE
      </div>
      <h1 class="sf-title">Daily Quiz</h1>
      <p>Challenge yourself with questions from all CS subjects. New questions every day!</p>
    </div>

    <!-- Category Filter -->
    <div style="text-align: center; margin-top: 32px; margin-bottom: 32px;">
      <label style="color: var(--txt2); font-size: 14px; margin-right: 12px;">Filter by:</label>
      <select id="quiz-category" onchange="loadQ(this.value)" style="padding: 8px 12px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1); cursor: pointer;">
        <option value="">All Subjects</option>
        <option value="Structured Programming">Structured Programming (C++)</option>
        <option value="Logic Design">Logic Design</option>
        <option value="Differential Equations">Differential Equations</option>
        <option value="Probability">Probability & Statistics</option>
        <option value="Discrete Math">Discrete Mathematics</option>
      </select>
    </div>

    <!-- Quiz Container -->
    <div class="lg lg-panel" style="padding: 40px; max-width: 700px; margin: 0 auto; border-radius: 20px;">
      <div class="lg-effect"></div>
      <div class="lg-tint"></div>
      <div class="lg-shine"></div>

      <div style="position: relative; z-index: 3;">
        <!-- Question -->
        <div style="margin-bottom: 32px;">
          <div style="font-size: 12px; color: var(--txt3); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;">Question <span id="q-num">1</span></div>
          <h2 id="q-text" style="font-size: 24px; font-weight: 700; color: var(--txt1); margin-bottom: 16px;">Loading question...</h2>
          <div id="q-category" style="font-size: 12px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.05em;"></div>
        </div>

        <!-- Options -->
        <div id="q-options" style="display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 32px;"></div>

        <!-- Result -->
        <div id="q-result" style="display: none; padding: 16px; border-radius: 12px; background: rgba(16, 185, 129, 0.2); border-left: 4px solid #10b981; margin-bottom: 24px;">
          <div id="result-text" style="color: var(--txt2); font-size: 14px; line-height: 1.6;"></div>
        </div>

        <!-- Explanation -->
        <div id="q-expl-box" style="display: none; padding: 16px; border-radius: 12px; background: rgba(168, 139, 250, 0.1); border-left: 4px solid #a78bfa; margin-bottom: 24px;">
          <div style="font-size: 12px; font-weight: 600; color: var(--accent); margin-bottom: 8px; text-transform: uppercase;">Explanation</div>
          <div id="q-expl" style="font-size: 14px; color: var(--txt2); line-height: 1.6;"></div>
        </div>

        <!-- Buttons -->
        <div style="display: flex; gap: 12px;">
          <button id="explain-btn" onclick="toggleExpl()" style="display: none; flex: 1; padding: 12px; background: var(--tint2); border: none; border-radius: 8px; color: var(--txt1); font-weight: 600; cursor: pointer;">Show Explanation</button>
          <button onclick="nextQuestion()" style="flex: 1; padding: 12px; background: linear-gradient(135deg, var(--accent), var(--glow)); border: none; border-radius: 8px; color: white; font-weight: 600; cursor: pointer;">Next Question →</button>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-top: 40px; max-width: 700px; margin-left: auto; margin-right: auto;">
      <div class="lg lg-panel" style="padding: 20px; text-align: center;">
        <div class="lg-effect"></div>
        <div class="lg-tint"></div>
        <div class="lg-shine"></div>
        <div style="position: relative; z-index: 3;">
          <div style="font-size: 28px; font-weight: 800; color: var(--accent); margin-bottom: 4px;" id="correct-count">0</div>
          <div style="font-size: 12px; color: var(--txt3); text-transform: uppercase;">Correct</div>
        </div>
      </div>
      <div class="lg lg-panel" style="padding: 20px; text-align: center;">
        <div class="lg-effect"></div>
        <div class="lg-tint"></div>
        <div class="lg-shine"></div>
        <div style="position: relative; z-index: 3;">
          <div style="font-size: 28px; font-weight: 800; color: var(--glow); margin-bottom: 4px;" id="total-count">0</div>
          <div style="font-size: 12px; color: var(--txt3); text-transform: uppercase;">Answered</div>
        </div>
      </div>
      <div class="lg lg-panel" style="padding: 20px; text-align: center;">
        <div class="lg-effect"></div>
        <div class="lg-tint"></div>
        <div class="lg-shine"></div>
        <div style="position: relative; z-index: 3;">
          <div style="font-size: 28px; font-weight: 800; color: #fbbf24; margin-bottom: 4px;" id="score-percent">0%</div>
          <div style="font-size: 12px; color: var(--txt3); text-transform: uppercase;">Score</div>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- Footer -->
<footer class="footer" style="border-top: 1px solid var(--tint1); padding: 48px 0; background: rgba(0,0,0,0.2);">
  <div class="wrap">
    <div style="border-top: 1px solid var(--tint1); padding-top: 24px; text-align: center;">
      <p class="sf-caption">© <span id="footer-year"></span> EDUMOE. Built with ❤️ for FUE CS students.</p>
    </div>
  </div>
</footer>

<!-- Modals (same as courses.html) -->
<div class="modal-overlay" id="loginModal" style="display: none;">
  <div class="modal-box lg lg-panel" style="width: 100%; max-width: 400px; padding: 32px; border-radius: 22px;">
    <div class="lg-effect"></div><div class="lg-tint"></div><div class="lg-shine"></div>
    <h2 style="position: relative; z-index: 3; margin-bottom: 20px; color: var(--txt1);">Login</h2>
    <input type="email" id="login-email" placeholder="Email" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-bottom: 12px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1);">
    <input type="password" id="login-password" placeholder="Password" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-bottom: 20px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1);">
    <button onclick="doLogin()" style="position: relative; z-index: 3; width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Login</button>
    <button onclick="document.getElementById('loginModal').style.display='none'" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-top: 8px; background: var(--tint1); color: var(--txt1); border: none; border-radius: 8px; cursor: pointer;">Close</button>
  </div>
</div>

<div class="modal-overlay" id="signupModal" style="display: none;">
  <div class="modal-box lg lg-panel" style="width: 100%; max-width: 400px; padding: 32px; border-radius: 22px;">
    <div class="lg-effect"></div><div class="lg-tint"></div><div class="lg-shine"></div>
    <h2 style="position: relative; z-index: 3; margin-bottom: 20px; color: var(--txt1);">Sign Up</h2>
    <input type="text" id="signup-name" placeholder="Full Name" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-bottom: 12px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1);">
    <input type="email" id="signup-email" placeholder="Email" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-bottom: 12px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1);">
    <input type="password" id="signup-password" placeholder="Password" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-bottom: 20px; background: var(--bg2); border: 1px solid var(--tint2); border-radius: 8px; color: var(--txt1);">
    <button onclick="doSignup()" style="position: relative; z-index: 3; width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer;">Sign Up</button>
    <button onclick="document.getElementById('signupModal').style.display='none'" style="position: relative; z-index: 3; width: 100%; padding: 10px; margin-top: 8px; background: var(--tint1); color: var(--txt1); border: none; border-radius: 8px; cursor: pointer;">Close</button>
  </div>
</div>

<div class="toast lg" id="toast" style="position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; z-index: 9999; opacity: 0; transition: opacity 0.3s;">
  <div class="lg-effect"></div><div class="lg-tint"></div><div class="lg-shine"></div>
  <span id="toast-msg" style="position: relative; z-index: 3;"></span>
</div>

<!-- Quiz Script -->
<script src="app.js"></script>
<script>
  // Simplified quiz system - load from app.js QUESTIONS
  let quizAnswered = false;
  let correctAnswers = 0;
  let totalAnswered = 0;

  function loadQ(category = '') {
    const categorySelect = document.getElementById('quiz-category');
    category = categorySelect.value || '';

    // Get all questions from app.js QUESTIONS object
    let allQuestions = Object.values(window.QUESTIONS || {}).flat();

    // Filter by category if selected
    if (category) {
      allQuestions = allQuestions.filter(q => q.subject === category);
    }

    // Pick random question
    if (allQuestions.length === 0) {
      loadQ(); // Recurse if no questions found
      return;
    }

    const q = allQuestions[Math.floor(Math.random() * allQuestions.length)];
    window.currentQ = q;
    quizAnswered = false;

    document.getElementById('q-text').textContent = q.q;
    document.getElementById('q-category').textContent = q.subject;
    document.getElementById('q-num').textContent = totalAnswered + 1;

    const optionsDiv = document.getElementById('q-options');
    optionsDiv.innerHTML = '';
    ['a', 'b', 'c', 'd'].forEach(opt => {
      const label = document.createElement('label');
      label.style.cssText = 'display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; cursor: pointer; transition: all 0.2s ease;';
      label.innerHTML = `<input type="radio" name="opt" value="${opt}" style="cursor: pointer;"> <span>${q[opt]}</span>`;
      label.onmouseover = () => label.style.background = 'rgba(255,255,255,0.1)';
      label.onmouseout = () => label.style.background = 'rgba(255,255,255,0.05)';
      label.onclick = () => answerQ(opt);
      optionsDiv.appendChild(label);
    });

    document.getElementById('q-result').style.display = 'none';
    document.getElementById('q-expl-box').style.display = 'none';
    document.getElementById('explain-btn').style.display = 'none';
  }

  function answerQ(opt) {
    if (quizAnswered) return;
    quizAnswered = true;
    totalAnswered++;

    const isCorrect = opt === window.currentQ.ans;
    if (isCorrect) correctAnswers++;

    const resultDiv = document.getElementById('q-result');
    const resultText = document.getElementById('result-text');
    resultDiv.style.display = 'block';
    resultText.textContent = isCorrect ? '✅ Correct! Great job!' : `❌ Incorrect. The correct answer is: ${window.currentQ[window.currentQ.ans]}`;

    document.getElementById('explain-btn').style.display = 'block';

    updateStats();
  }

  function toggleExpl() {
    document.getElementById('q-expl-box').style.display = document.getElementById('q-expl-box').style.display === 'none' ? 'block' : 'none';
    if (document.getElementById('q-expl-box').style.display === 'block') {
      document.getElementById('q-expl').textContent = window.currentQ.expl;
    }
  }

  function nextQuestion() {
    loadQ();
  }

  function updateStats() {
    document.getElementById('correct-count').textContent = correctAnswers;
    document.getElementById('total-count').textContent = totalAnswered;
    const percent = totalAnswered > 0 ? Math.round((correctAnswers / totalAnswered) * 100) : 0;
    document.getElementById('score-percent').textContent = percent + '%';
  }

  // Initialize
  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('footer-year').textContent = new Date().getFullYear();
    loadQ();
  });
</script>

</body>
</html>
